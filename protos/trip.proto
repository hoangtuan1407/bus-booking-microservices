syntax = "proto3";
package trip;

service TripService {
  // Trips
  rpc GetTrip(GetTripRequest) returns (TripResponse);
  rpc SearchTrips(SearchTripsRequest) returns (SearchTripsResponse);
  rpc CreateTrip(CreateTripRequest) returns (TripResponse);
  rpc UpdateTripStatus(UpdateTripStatusRequest) returns (TripResponse);
  rpc DeleteTrip(DeleteRequest) returns (DeleteResponse);
  rpc UpdateTripBookedSeats(UpdateTripBookedSeatsRequest) returns (UpdateTripBookedSeatsResponse);
  
  // Routes
  rpc CreateRoute(CreateRouteRequest) returns (RouteResponse);
  rpc GetRoutes(EmptyRequest) returns (GetRoutesResponse);
  rpc DeleteRoute(DeleteRequest) returns (DeleteResponse);
  
  // Buses
  rpc CreateBus(CreateBusRequest) returns (BusResponse);
  rpc GetBuses(EmptyRequest) returns (GetBusesResponse);
  rpc DeleteBus(DeleteRequest) returns (DeleteResponse);

  // Logs
  rpc GetEventLogs(EmptyRequest) returns (GetEventLogsResponse);
}

message EmptyRequest {}

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {
  bool success = 1;
  string message = 2;
}

message EventLog {
  int32 id = 1;
  string event_type = 2;
  string event_data = 3;
  string created_at = 4;
}

message GetEventLogsResponse {
  repeated EventLog logs = 1;
}

message Route {
  string id = 1;
  string origin = 2;
  string destination = 3;
  int32 distance_km = 4;
  float estimated_hours = 5;
}

message Bus {
  string id = 1;
  string license_plate = 2;
  string bus_house = 3;
  string bus_type = 4;
  int32 total_seats = 5;
}

message Trip {
  string id = 1;
  string origin = 2;
  string destination = 3;
  string departure_time = 4;
  string arrival_time = 5;
  string bus_house = 6;
  string bus_type = 7;
  int32 price = 8;
  int32 total_seats = 9;
  int32 available_seats = 10;
  string status = 11;
  string route_id = 12;
  string bus_id = 13;
  repeated string pickup_points = 14;
  repeated string dropoff_points = 15;
}

// Route Requests
message CreateRouteRequest {
  string origin = 1;
  string destination = 2;
  int32 distance_km = 3;
  float estimated_hours = 4;
}
message RouteResponse {
  Route route = 1;
}
message GetRoutesResponse {
  repeated Route routes = 1;
}

// Bus Requests
message CreateBusRequest {
  string license_plate = 1;
  string bus_house = 2;
  string bus_type = 3;
  int32 total_seats = 4;
}
message BusResponse {
  Bus bus = 1;
}
message GetBusesResponse {
  repeated Bus buses = 1;
}

// Trip Requests
message GetTripRequest {
  string id = 1;
}
message TripResponse {
  Trip trip = 1;
}

message SearchTripsRequest {
  string origin = 1;
  string destination = 2;
  string departure_date = 3;
  int32 limit = 4;
  int32 offset = 5;
  int32 min_price = 6;
  int32 max_price = 7;
  string bus_house = 8;
  string bus_type = 9;
  string sort_by = 10;
  string status = 11;
  string time_range = 12;
  int32 min_available_seats = 13;
}

message SearchTripsResponse {
  repeated Trip trips = 1;
  int32 total = 2;
  string nearest_date = 3;
}

message CreateTripRequest {
  string route_id = 1;
  string bus_id = 2;
  string departure_time = 3;
  string arrival_time = 4;
  int32 price = 5;
}

message UpdateTripStatusRequest {
  string id = 1;
  string status = 2; // ACTIVE, LOCKED, DEPARTED, COMPLETED
}

message UpdateTripBookedSeatsRequest {
  string trip_id = 1;
  int32 diff = 2;
}

message UpdateTripBookedSeatsResponse {
  bool success = 1;
}