syntax = "proto3";
package booking;

service BookingService {
  rpc CreateBooking(CreateBookingRequest) returns (BookingResponse);
  rpc PayBooking(PayBookingRequest) returns (BookingResponse);
  rpc CancelBooking(CancelBookingRequest) returns (BookingResponse);
  rpc GetBooking(GetBookingRequest) returns (BookingResponse);
  rpc GetAllBookings(GetAllBookingsRequest) returns (GetAllBookingsResponse);
  rpc GetUserBookings(GetUserBookingsRequest) returns (GetAllBookingsResponse);
  rpc GetBookingByIdAndEmail(GetBookingByIdAndEmailRequest) returns (GetBookingByIdAndEmailResponse);
  rpc CheckinBooking(CheckinBookingRequest) returns (BookingResponse);
}

message PassengerInfo {
  string seat_id = 1;
  string name = 2;
  string phone = 3;
  string email = 4;
  string identity_number = 5;
}

message CreateBookingRequest {
  string trip_id = 1;
  repeated PassengerInfo passengers = 2;
  string customer_name = 3;
  string customer_email = 4;
  string customer_phone = 5;
  string user_id = 6; // Truyền rỗng nếu là Guest checkout
}

message PayBookingRequest {
  string booking_id = 1;
}

message CancelBookingRequest {
  string booking_id = 1;
}

message BookingResponse {
  string booking_id = 1;
  string status = 2; // Trạng thái: DRAFT, PENDING_PAYMENT, PAID, CANCELLED
  string message = 3;
}

message GetBookingRequest {
  string booking_id = 1;
  string email = 2; // Yêu cầu nhập kèm email để Guest tra cứu vé an toàn
}

message GetAllBookingsRequest {
  int32 limit = 1;
  int32 offset = 2;
  string trip_id = 3;
}

message GetUserBookingsRequest {
  string user_id = 1;
}

message GetAllBookingsResponse {
  repeated BookingInfo bookings = 1;
  int32 total = 2;
}

message TicketInfo {
  string seat_number = 1;
  string ticket_code = 2;
  string passenger_name = 3;
  string passenger_phone = 4;
  string passenger_email = 5;
  string passenger_identity = 6;
}

message BookingInfo {
  string id = 1;
  string trip_id = 2;
  string customer_name = 3;
  string customer_phone = 4;
  string customer_email = 5;
  int32 total_amount = 6;
  string status = 7;
  repeated TicketInfo tickets = 8;
  string created_at = 9;
}

message CheckinBookingRequest {
  string booking_id = 1;
}
message GetBookingByIdAndEmailRequest {
  string id = 1;
  string email = 2;
}

message GetBookingByIdAndEmailResponse {
  BookingInfo booking = 1;
}
